workflows:
  # ─────────────────────────────────────────────────────────────────────────────
  # iOS → App Store Connect → TestFlight
  # Requires: App Store Connect API Key configured in Codemagic Team settings
  # ─────────────────────────────────────────────────────────────────────────────
  ios-release:
    name: IronCircle iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "iron-circle-apple" # Match with Codemagic UI integration name

    environment:
      groups:
        - production_keys
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ironcircle.app
      node: 22.14.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build Next.js (static export)
        script: npm run build

      - name: Capacitor sync iOS
        script: |
          # Ensure Next.js export exists
          if [ ! -d "out" ]; then
            npm run build
          fi
          
          # Add and sync iOS platform
          npx cap add ios || true
          npx cap sync ios
          
          # Debug: List the ios directory structure
          find ios -name "*.xcworkspace" || echo "No xcworkspace found"

      - name: Build IPA
        script: |
          # Automate App Store Encryption Compliance & Privacy Strings
          # This prevents the "App Encryption Documentation" popup and satisfies missing location purpose strings
          PLIST_PATH=$(find ios -name "Info.plist" | grep "App/Info.plist" | head -n 1)
          if [ -n "$PLIST_PATH" ]; then
            # Encryption Compliance
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST_PATH" || \
            /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST_PATH"

            # Location Privacy Strings (requested by Apple)
            DESC_WHEN_IN_USE="IronCircle benötigt deinen Standort, um Workouts in deinem Fitnessstudio automatisch zu tracken."
            DESC_ALWAYS="IronCircle benötigt Zugriff auf deinen Standort im Hintergrund, um dein Training im Studio zuverlässig zu erfassen, auch wenn dein Handy in der Tasche ist."
            
            /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string '$DESC_WHEN_IN_USE'" "$PLIST_PATH" || \
            /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription '$DESC_WHEN_IN_USE'" "$PLIST_PATH"
            
            /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string '$DESC_ALWAYS'" "$PLIST_PATH" || \
            /usr/libexec/PlistBuddy -c "Set :NSLocationAlwaysAndWhenInUseUsageDescription '$DESC_ALWAYS'" "$PLIST_PATH"

            # Build Number Automation (uniqueness for App Store Connect)
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST_PATH"
          fi

          # Fetch and install provisioning profiles
          xcode-project use-profiles
          
          # Build the IPA file
          # We use a wildcard for the workspace to be safer if paths vary
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -n 1)
          if [ -z "$WORKSPACE" ]; then
            echo "Error: No .xcworkspace found. Listing ios directory:"
            ls -R ios
            exit 1
          fi
          
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration          # Uses the API key from Codemagic Team settings
        submit_to_testflight: true

      email:
        recipients:
          - janschmid.office@gmail.com       # ← Deine E-Mail eintragen
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Android → APK + AAB
  # Requires: Android Keystore added in Codemagic Team settings → Code signing
  # ─────────────────────────────────────────────────────────────────────────────
  android-release:
    name: IronCircle Android → APK + AAB
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      groups:
        - production_keys
      android_signing:
        - ironcircle_keystore      # ← Name des Keystores in Codemagic eintragen
      node: 22.14.0
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build Next.js (static export)
        script: npm run build

      - name: Capacitor sync Android
        script: npx cap sync android

      - name: Set Gradle permissions
        script: chmod +x android/gradlew

      - name: Build Release APK + AAB
        script: |
          cd android
          ./gradlew bundleRelease assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - you@example.com        # ← Deine E-Mail eintragen
        notify:
          success: true
          failure: true
