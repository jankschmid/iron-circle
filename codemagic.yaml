workflows:
  # ─────────────────────────────────────────────────────────────────────────────
  # iOS → App Store Connect → TestFlight
  # Requires: App Store Connect API Key configured in Codemagic Team settings
  # ─────────────────────────────────────────────────────────────────────────────
  ios-release:
    name: IronCircle iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: "iron-circle-apple" # Match with Codemagic UI integration name

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.ironcircle.app
      node: 22.14.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build Next.js (static export)
        script: npm run build

      - name: Capacitor sync iOS
        script: |
          npx cap add ios || true
          npx cap sync ios

      - name: Build IPA
        script: |
          # Versuch 1: Profile basierend auf Bundle-ID finden/erstellen
          xcode-project use-profiles --bundle-id com.ironcircle.app --type app_store --team-id 9CFN4WT7NM
          
          # Falls das oben fehlschlägt, versuchen wir es mit manuellem Cert-Check
          # xcode-project list-profiles # (Optionaler Debug-Befehl)

          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App \
            --bundle-id com.ironcircle.app

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration          # Uses the API key from Codemagic Team settings
        submit_to_testflight: true

      email:
        recipients:
          - janschmid.office@gmail.com       # ← Deine E-Mail eintragen
        notify:
          success: true
          failure: true

  # ─────────────────────────────────────────────────────────────────────────────
  # Android → APK + AAB
  # Requires: Android Keystore added in Codemagic Team settings → Code signing
  # ─────────────────────────────────────────────────────────────────────────────
  android-release:
    name: IronCircle Android → APK + AAB
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      android_signing:
        - ironcircle_keystore      # ← Name des Keystores in Codemagic eintragen
      node: 22.14.0
      java: 17

    scripts:
      - name: Install dependencies
        script: npm install --legacy-peer-deps

      - name: Build Next.js (static export)
        script: npm run build

      - name: Capacitor sync Android
        script: npx cap sync android

      - name: Set Gradle permissions
        script: chmod +x android/gradlew

      - name: Build Release APK + AAB
        script: |
          cd android
          ./gradlew bundleRelease assembleRelease

    artifacts:
      - android/app/build/outputs/apk/release/*.apk
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      email:
        recipients:
          - you@example.com        # ← Deine E-Mail eintragen
        notify:
          success: true
          failure: true
